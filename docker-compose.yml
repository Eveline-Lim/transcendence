services:
  ##################################################################
  # POSTGRES
  ##################################################################
  postgres:
    image: postgres:15-alpine
    container_name: transcendence_db
    environment:
      POSTGRES_DB: transcendence
      POSTGRES_USER: transcendence
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - transcendence_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transcendence"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ##################################################################
  # REDIS
  ##################################################################
  redis:
    image: redis:7-alpine
    container_name: transcendence_redis
    secrets:
      - redis_password
    command: sh -c "redis-server --requirepass $$(cat /run/secrets/redis_password) --appendonly yes"
    volumes:
      - redis_data:/data
    networks:
      - transcendence_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  ##################################################################
  # AUTH SERVICE
  ##################################################################
  auth_service:
    build: ./services/auth_service
    container_name: transcendence_auth
    secrets:
      - redis_password
      - jwt_secret
      - jwt_expiration
      - oauth_42_client_id
      - oauth_42_client_secret
      - oauth_42_client_callback_url
      - frontend_url
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_EXPIRATION_FILE: /run/secrets/jwt_expiration
      OAUTH_42_CLIENT_ID_FILE: /run/secrets/oauth_42_client_id
      OAUTH_42_CLIENT_SECRET_FILE: /run/secrets/oauth_42_client_secret
      OAUTH_42_CLIENT_CALLBACK_URL_FILE: /run/secrets/oauth_42_client_callback_url
      FRONTEND_URL_FILE: /run/secrets/frontend_url
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - transcendence_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 40s

  ##################################################################
  # PLAYER SERVICE
  ##################################################################
  player_service:
    build: ./services/player_service
    container_name: transcendence_player
    secrets:
      - db_password
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: transcendence
      DB_USER: transcendence
      DB_PASSWORD_FILE: /run/secrets/db_password
      AVATAR_UPLOAD_DIR: /app/uploads/avatars
      AVATAR_BASE_URL: /uploads/avatars
    volumes:
      - avatar_data:/app/uploads/avatars
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - transcendence_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/v1/players | grep -qE '[2-4][0-9][0-9]'"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  ##################################################################
  # GAME SERVICE
  ##################################################################
  game_service:
    build: ./services/game_service
    container_name: transcendence_game
    secrets:
      - redis_password
    environment:
      REDIS_URL: redis://redis:6379/1
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      PORT: 3001
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - transcendence_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  ##################################################################
  # MATCH SERVICE
  ##################################################################
  match_service:
    build: ./services/match_service
    container_name: transcendence_match
    networks:
      - transcendence_network
    restart: unless-stopped

  ##################################################################
  # FRONTEND
  ##################################################################
  frontend:
    build: ./frontend
    container_name: transcendence_frontend
    mem_limit: 4g
    networks:
      - transcendence_network

  ##################################################################
  # NGINX
  ##################################################################
  nginx:
    build: ./services/nginx
    container_name: transcendence_nginx
    secrets:
      - ssl_cert
      - ssl_key
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - avatar_data:/app/uploads/avatars:ro
      - ./services/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth_service
      - frontend
      - player_service
      - game_service
    networks:
      - transcendence_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  avatar_data:

networks:
  transcendence_network:

secrets:
  db_password:
    file: ./secrets/db_password
  redis_password:
    file: ./secrets/redis_password
  jwt_secret:
    file: ./secrets/jwt_secret
  jwt_expiration:
    file: ./secrets/jwt_expiration
  ssl_cert:
    file: ./secrets/ssl_cert
  ssl_key:
    file: ./secrets/ssl_key
  oauth_42_client_id:
    file: ./secrets/oauth_42_client_id
  oauth_42_client_secret:
    file: ./secrets/oauth_42_client_secret
  oauth_42_client_callback_url:
    file: ./secrets/oauth_42_client_callback_url
  frontend_url:
    file: ./secrets/frontend_url
