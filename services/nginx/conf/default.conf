server
{
	listen 80;
	server_name localhost;

	location /health
	{
		access_log off;
		return 200 "healthy
";
	}

	# Use Docker internal DNS so upstreams resolve at request time
	resolver 127.0.0.11 valid=30s ipv6=off;

	set $player_upstream  http://player_service:8080;
	set $frontend_upstream http://frontend:80;

	location /uploads/avatars/
	{
		alias /app/uploads/avatars/;
		expires 7d;
		add_header Cache-Control "public";
	}

	location /api/v1/
	{
		proxy_pass $player_upstream/api/v1/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /api/auth/
	{
		proxy_pass http://auth_service:3000/api/auth/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /
	{
		proxy_pass $frontend_upstream;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}

server
{
	listen 443 ssl;
	server_name localhost;

	ssl_certificate         /run/secrets/ssl_cert;
	ssl_certificate_key /run/secrets/ssl_key;

	# Use Docker internal DNS so upstreams resolve at request time
