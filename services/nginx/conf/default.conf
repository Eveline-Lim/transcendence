server
{
	listen 80;
	server_name localhost;

	location /health
	{
		access_log off;
		return 200 "healthy\n";
	}

	# Use Docker internal DNS so upstreams resolve at request time
	resolver 127.0.0.11 valid=30s ipv6=off;

	set $player_upstream	http://player_service:8080;
	set $frontend_upstream	http://frontend:80;

	# ── JWT validation via auth_service ─────────────────────────
	location = /_validate_jwt
	{
		internal;
		proxy_pass http://auth_service:3000/api/auth/verify;
		proxy_pass_request_body off;
		proxy_set_header Content-Length "";
		proxy_set_header X-Original-URI $request_uri;
		proxy_set_header Authorization $http_authorization;
	}
	# ─────────────────────────────────────────────────────────────

	location /uploads/avatars/
	{
		alias /app/uploads/avatars/;
		expires 7d;
		add_header Cache-Control "public";
	}

	# Protected: requires a valid JWT
	location /api/v1/
	{
		auth_request /_validate_jwt;

		# Capture validated claims from auth_service response headers
		auth_request_set $jwt_player_id $upstream_http_x_player_id;
		auth_request_set $jwt_username  $upstream_http_x_username;

		proxy_pass $player_upstream/api/v1/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Player-Id $jwt_player_id;
		proxy_set_header X-Username $jwt_username;
	}

	# Public: auth endpoints handle their own authentication
	location /api/auth/
	{
		proxy_pass http://auth_service:3000/api/auth/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /
	{
		proxy_pass $frontend_upstream;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}

