# Redirect HTTP → HTTPS
server
{
	listen 8080;
	server_name localhost;

	location /health
	{
		access_log off;
		return 200 "healthy\n";
	}

	location /
	{
		return 301 https://$host:8443$request_uri;
	}
}

server
{
	listen 8443 ssl;
	server_name localhost;

	modsecurity on;
	modsecurity_rules_file /etc/modsecurity/modsecurity.conf;

	ssl_certificate		/run/secrets/ssl_cert;
	ssl_certificate_key	/run/secrets/ssl_key;

	# Use Docker internal DNS so upstreams resolve at request time
	resolver 127.0.0.11 valid=30s ipv6=off;

	set $player_upstream	http://player_service:8080;
	set $auth_upstream	http://auth_service:3000;
	set $chat_upstream	http://chat_service:3000;
	set $frontend_upstream	http://frontend:80;

	location /health
	{
		access_log off;
		return 200 "healthy\n";
	}

	# ── JWT validation via auth_service ─────────────────────────
	location = /_validate_jwt
	{
		internal;
		modsecurity off;
		rewrite ^ /auth/verify break;
		proxy_pass $auth_upstream;
		proxy_pass_request_body off;
		proxy_set_header Content-Length "";
		proxy_set_header X-Original-URI $request_uri;
		proxy_set_header Authorization $http_authorization;
	}

	# JWT validation for WebSocket (token passed as ?token= query param)
	# The auth_request subrequest has no query string of its own, so the token
	# must be included in the auth_request URL: auth_request /_validate_jwt_ws?token=$arg_token
	# The trailing ? in the rewrite strips the query string before proxying to the auth service.
	location = /_validate_jwt_ws
	{
		internal;
		modsecurity off;
		# $validate_bearer is set by the outer location (/ws/chat) before auth_request fires.
		# nginx subrequests inherit variables from the parent request.
		rewrite ^ /auth/verify break;
		proxy_pass $auth_upstream;
		proxy_pass_request_body off;
		proxy_set_header Content-Length "";
		proxy_set_header X-Original-URI $request_uri;
		proxy_set_header Authorization $validate_bearer;
	}
	# ─────────────────────────────────────────────────────────────

	location /uploads/avatars/
	{
		# Reject path traversal attempts
		if ($request_uri ~* "\.\.") {
			return 403;
		}

		# Only serve image files
		location ~* \.(?:jpg|jpeg|png|gif|webp|svg)$ {
			alias /app/uploads/avatars/;
			expires 7d;
			add_header Cache-Control "public";
		}

		return 403;
	}

	# Exception ModSecurity
	location ~* ^/api/v1/players/
	{
	    auth_request /_validate_jwt;
	
	    auth_request_set $jwt_user_id  $upstream_http_x_user_id;
	    auth_request_set $jwt_username $upstream_http_x_username;
	
	    # Désactiver la règle qui bloque le PATCH
	    modsecurity_rules '
	        SecRuleRemoveById 949110
	    ';
	
	    proxy_pass $player_upstream;
	    proxy_http_version 1.1;
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	    proxy_set_header X-Forwarded-Proto $scheme;
	    proxy_set_header X-User-Id $jwt_user_id;
	    proxy_set_header X-Username $jwt_username;
	}

	# Chat REST endpoints: JWT-protected, proxied to chat_service
	location /api/v1/chat/
	{
		auth_request /_validate_jwt;

		auth_request_set $jwt_user_id  $upstream_http_x_user_id;
		auth_request_set $jwt_username $upstream_http_x_username;

		rewrite ^/api/v1/(.*) /$1 break;
		proxy_pass $chat_upstream;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-User-Id $jwt_user_id;
		proxy_set_header X-Username $jwt_username;
	}

	# Protected: requires a valid JWT
	location /api/v1/
	{
		auth_request /_validate_jwt;

		# Capture validated claims from auth_service response headers
		auth_request_set $jwt_user_id  $upstream_http_x_user_id;
		auth_request_set $jwt_username $upstream_http_x_username;

		proxy_pass $player_upstream;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-User-Id $jwt_user_id;
		proxy_set_header X-Username $jwt_username;
	}

	# WebSocket chat: JWT validated via query-param token, gateway sets identity headers
	location /ws/chat
	{
		# Capture the token into a variable so the auth subrequest can access it.
		set $validate_bearer "Bearer $arg_token";
		auth_request /_validate_jwt_ws;

		auth_request_set $jwt_user_id  $upstream_http_x_user_id;
		auth_request_set $jwt_username $upstream_http_x_username;

		proxy_pass $chat_upstream;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-User-Id $jwt_user_id;
		proxy_set_header X-Username $jwt_username;
		proxy_read_timeout 3600s;
		proxy_send_timeout 3600s;
	}

	# Public: auth endpoints (no JWT required)
	location /api/v1/auth/
	{
		rewrite ^/api/v1/(.*) /$1 break;
		proxy_pass $auth_upstream;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /
	{
		proxy_pass $frontend_upstream;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}
