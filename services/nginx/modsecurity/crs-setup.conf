# ============================================================
# OWASP CRS - Configuration
# ============================================================

# Niveau de paranoïa (1 à 4)
# 1 = basique, peu de faux positifs
# 2 = recommandé, bon équilibre
SecAction "id:900000, phase:1, nolog, pass, t:none, \
    setvar:tx.blocking_paranoia_level=1"

SecAction "id:900001, phase:1, nolog, pass, t:none, \
    setvar:tx.detection_paranoia_level=1"

# Seuils d'anomalie (score avant blocage)
# Inbound  = requêtes entrantes
# Outbound = réponses sortantes
SecAction "id:900110, phase:1, nolog, pass, t:none, \
    setvar:tx.inbound_anomaly_score_threshold=5, \
    setvar:tx.outbound_anomaly_score_threshold=4"

# Autoriser les méthodes HTTP utilisées par ton app
SecAction "id:900200, phase:1, nolog, pass, t:none, \
    setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT DELETE'"

# Types de contenu autorisés
SecAction "id:900220, phase:1, nolog, pass, t:none, \
    setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded| \
    |multipart/form-data| \
    |text/xml| \
    |application/xml| \
    |application/soap+xml| \
    |application/json|'"

# Taille max des arguments
SecAction "id:900320, phase:1, nolog, pass, t:none, \
    setvar:tx.max_num_args=255"

# Extensions de fichiers bloquées
SecAction "id:900340, phase:1, nolog, pass, t:none, \
    setvar:'tx.restricted_extensions=.asa/ .asax/ .ascx/ .backup/ .bak/ \
    .bat/ .cdx/ .cer/ .cfg/ .cmd/ .com/ .config/ .conf/ .cs/ .csproj/ \
    .csr/ .dat/ .db/ .dbf/ .dll/ .dos/ .htr/ .htw/ .ida/ .idc/ .idq/ \
    .inc/ .ini/ .key/ .licx/ .lnk/ .log/ .mdb/ .old/ .pass/ .pdb/ \
    .pol/ .printer/ .pwd/ .rdb/ .resources/ .resx/ .sql/ .swp/ .sys/ \
    .vb/ .vbs/ .vbproj/ .vsdisco/ .webinfo/ .xsd/ .xsx/'"
