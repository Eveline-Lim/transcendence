name: "[DEV] Build and Push Docker Images"

on:
  push:
    branches: [dev]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  IMAGE_PREFIX_LC: '' # set dynamically in steps

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX_LC=${IMAGE_PREFIX,,}" >> $GITHUB_ENV

      - name: Determine image tag
        id: tag
        run: |
          # Sanitize branch name for use as Docker tag
          RAW_REF="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          TAG=$(echo "$RAW_REF" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-128)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push all services
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          SHA="${{ steps.tag.outputs.sha_short }}"

          # Get the compose project name (used as image name prefix)
          PROJECT=$(docker compose config --format json | jq -r '.name')

          for service in $(docker compose config --services); do
            # Skip services without a build context (e.g. postgres, redis)
            has_build=$(docker compose config --format json | jq -r --arg s "$service" '.services[$s].build // empty')
            if [[ -z "$has_build" ]]; then
              echo "Skipping ${service} (no build context)"
              continue
            fi

            image_branch="${IMAGE_PREFIX_LC}/transcendence-${service}:${TAG}"
            image_sha="${IMAGE_PREFIX_LC}/transcendence-${service}:${SHA}"

            echo "Building ${service} as ${image_branch} / ${image_sha}"

            docker compose build ${service}

            # The local image name follows the pattern: <project>-<service>
            local_image="${PROJECT}-${service}"

            docker tag "${local_image}" "${image_branch}"
            docker tag "${local_image}" "${image_sha}"
            docker push "${image_branch}"
            docker push "${image_sha}"
          done
