name: "[DEV] Build and Push Docker Images"

on:
  push:
    branches: [dev]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tag
        run: |
          # Sanitize branch name for use as Docker tag
          RAW_REF="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          TAG=$(echo "$RAW_REF" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-128)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push all services
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          SHA="${{ steps.tag.outputs.sha_short }}"

          for service in $(docker compose config --services); do
            image_branch="${{ env.IMAGE_PREFIX }}/transcendence-${service}:${TAG}"
            image_sha="${{ env.IMAGE_PREFIX }}/transcendence-${service}:${SHA}"

            echo "Building ${service} as ${image_branch} / ${image_sha}"

            docker compose build ${service}

            local_image=$(docker compose images ${service} --format json | jq -r '.[0].Repository + ":" + .[0].Tag')

            docker tag "${local_image}" "${image_branch}"
            docker tag "${local_image}" "${image_sha}"
            docker push "${image_branch}"
            docker push "${image_sha}"
          done
