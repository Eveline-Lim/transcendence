name: "[PROD] Build and Push Docker Images"

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # Use the release tag (e.g. v1.2.3)
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push all services
        run: |
          VERSION="${{ steps.tag.outputs.version }}"

          for service in $(docker compose config --services); do
            image_latest="${{ env.IMAGE_PREFIX }}/transcendence-${service}:latest"

            echo "Building ${service} as ${image_latest}"

            docker compose build ${service}

            local_image=$(docker compose images ${service} --format json | jq -r '.[0].Repository + ":" + .[0].Tag')

            docker tag "${local_image}" "${image_latest}"
            docker push "${image_latest}"

            # Also tag with the release version when triggered by a release
            if [[ -n "${VERSION}" ]]; then
              image_version="${{ env.IMAGE_PREFIX }}/transcendence-${service}:${VERSION}"
              docker tag "${local_image}" "${image_version}"
              docker push "${image_version}"
              echo "  → also pushed ${image_version}"
            fi
          done
