name: "[PROD] Build and Push Docker Images"

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  IMAGE_PREFIX_LC: '' # set dynamically in steps

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX_LC=${IMAGE_PREFIX,,}" >> $GITHUB_ENV

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # Use the release tag (e.g. v1.2.3)
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push all services
        run: |
          VERSION="${{ steps.tag.outputs.version }}"

          # Get the compose project name (used as image name prefix)
          PROJECT=$(docker compose config --format json | jq -r '.name')

          for service in $(docker compose config --services); do
            # Skip services without a build context (e.g. postgres, redis)
            has_build=$(docker compose config --format json | jq -r --arg s "$service" '.services[$s].build // empty')
            if [[ -z "$has_build" ]]; then
              echo "Skipping ${service} (no build context)"
              continue
            fi

            image_latest="${IMAGE_PREFIX_LC}/transcendence-${service}:latest"

            echo "Building ${service} as ${image_latest}"

            docker compose build ${service}

            # The local image name follows the pattern: <project>-<service>
            local_image="${PROJECT}-${service}"

            docker tag "${local_image}" "${image_latest}"
            docker push "${image_latest}"

            # Also tag with the release version when triggered by a release
            if [[ -n "${VERSION}" ]]; then
              image_version="${IMAGE_PREFIX_LC}/transcendence-${service}:${VERSION}"
              docker tag "${local_image}" "${image_version}"
              docker push "${image_version}"
              echo "  → also pushed ${image_version}"
            fi
          done
