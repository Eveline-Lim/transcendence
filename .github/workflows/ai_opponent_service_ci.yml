name: Test AI Opponent Service

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'services/ai_opponent_service/**'
      - '.github/workflows/ai_opponent_service_ci.yml'
  push:
    paths:
      - 'services/ai_opponent_service/**'
      - '.github/workflows/ai_opponent_service_ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai_opponent_service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/ai_opponent_service/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Generate gRPC stubs
        run: |
          mkdir -p generated
          python -m grpc_tools.protoc \
            --proto_path=proto \
            --python_out=generated \
            --grpc_python_out=generated \
            proto/ai_opponent_service.proto
          touch generated/__init__.py
          sed -i 's/^import ai_opponent_service_pb2/from generated import ai_opponent_service_pb2/' \
            generated/ai_opponent_service_pb2_grpc.py

      - name: Run tests
        run: |
          pytest tests/ -v; rc=$?
          if [ $rc -ne 0 ] && [ $rc -ne 5 ]; then exit $rc; fi
          [ $rc -eq 5 ] && echo "No tests collected, skipping."

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/ai_opponent_service
          push: false
          tags: ai_opponent_service:ci
