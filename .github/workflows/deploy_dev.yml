name: "[DEV] Deploy to VPS"

on:
  workflow_run:
    workflows: ["[DEV] Build and Push Docker Images"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }} 
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd ~/transcendence

            git pull

            # Pull all images in parallel
            docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull --parallel

            # Restart containers with new images
            docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d --remove-orphans

            # Clean up old images
            docker image prune -f
