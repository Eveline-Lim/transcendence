name: Test Match Service

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'services/match_service/**'
      - '.github/workflows/matchemaking_service_cli.yml'
  push:
    paths:
      - 'services/match_service/**'
      - '.github/workflows/matchemaking_service_cli.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/match_service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/match_service/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/match_service/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t match_service:${{ github.sha }} services/match_service
